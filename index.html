<script>
  // Textos traduzidos
  const translations = {
    "pt": "Olá, pode se inscrever no meu canal do YouTube? (@vipnunes)",
    "en": "Hi, can you subscribe to my YouTube channel? (@vipnunes)",
    "es": "Hola, ¿puedes suscribirte a mi canal de YouTube? (@vipnunes)"
  };

  // Detecta o idioma do navegador
  const userLang = navigator.language.slice(0, 2);
  const popupText = document.getElementById("popup-text");

  // Aplica a tradução baseada no idioma ou usa português como padrão
  popupText.textContent = translations[userLang] || translations["pt"];

  // Exibe o fundo e o pop-up
  document.getElementById("popup-overlay").style.display = "block";
  document.getElementById("popup").style.display = "block";

  // Função para fechar o pop-up
  document.getElementById("popup-close").addEventListener("click", () => {
    document.getElementById("popup").style.display = "none";
    document.getElementById("popup-overlay").style.display = "none";
  });
